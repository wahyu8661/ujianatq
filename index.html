<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daftar Mata Pelajaran</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial, sans-serif;
    background:#f5f7fb;
    color:#002f6c;
    text-align:center;
}

#logo{
    width:120px;
    margin-top:10px;
}

h1{
    margin-top:10px;
    font-size:28px;
}

#loading{
    margin-top:30px;
    font-size:18px;
}

#mapelContainer{
    width:100%;
    max-width:700px;
    margin:30px auto;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.mapel-card{
    background:white;
    border-radius:14px;
    padding:18px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.mapel-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:12px;
}

.mapel-button{
    display:inline-block;
    padding:12px 25px;
    background:#002f6c;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
    transition:0.3s;
}

.mapel-button:hover{
    background:#fdb813;
    color:#002f6c;
}

#errorBox{
    display:none;
    margin-top:20px;
    background:#ffe5e5;
    color:#cc0000;
    padding:15px;
    border-radius:10px;
    max-width:500px;
    margin-left:auto;
    margin-right:auto;
}

</style>
</head>

<body>

<img id="logo" src="Asset 1.png">

<h1>DAFTAR MATA PELAJARAN</h1>

<div id="loading">
    Memuat data ujian...
</div>

<div id="errorBox"></div>

<div id="mapelContainer"></div>

<script>

function loadMapel() {

    var loading = document.getElementById("loading");
    var container = document.getElementById("mapelContainer");
    var errorBox = document.getElementById("errorBox");

    var url =
    "https://docs.google.com/spreadsheets/d/1ZbAWU8G2ZM1hUeA7cMVCP3cl6O-E1jMTd3dIMXI4VTI/gviz/tq?tqx=out:json";

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function () {

        if (xhr.readyState == 4) {

            loading.style.display = "none";

            // BERHASIL
            if (xhr.status == 200) {

                try {

                    var text = xhr.responseText;

                    // PARSE JSON GOOGLE
                    var json = JSON.parse(
                        text.substring(47).slice(0, -2)
                    );

                    var rows = json.table.rows;

                    // JIKA TIDAK ADA DATA
                    if (!rows || rows.length === 0) {

                        errorBox.style.display = "block";
                        errorBox.innerHTML = "Data mapel kosong.";

                        return;

                    }

                    // LOOP DATA
                    for (var i = 0; i < rows.length; i++) {

                        var namaMapel = "";
                        var linkUjian = "";

                        // KOLOM A
                        if (
                            rows[i].c[0] != null &&
                            rows[i].c[0].v != null
                        ) {

                            namaMapel =
                            rows[i].c[0].v.toString();

                        }

                        // KOLOM B
                        if (
                            rows[i].c[1] != null &&
                            rows[i].c[1].v != null
                        ) {

                            linkUjian =
                            rows[i].c[1].v.toString();

                        }

                        // SKIP JIKA KOSONG
                        if (
                            namaMapel == "" ||
                            linkUjian == ""
                        ) {

                            continue;

                        }

                        // CARD
                        var card =
                        document.createElement("div");

                        card.className = "mapel-card";

                        // TITLE
                        var title =
                        document.createElement("div");

                        title.className = "mapel-title";
                        title.innerHTML = namaMapel;

                        // BUTTON
                        var button =
                        document.createElement("a");

                        button.className = "mapel-button";
                        button.innerHTML = "Masuk Ujian";
                        button.href = linkUjian;
                        button.target = "_self";

                        // GABUNG
                        card.appendChild(title);
                        card.appendChild(button);

                        container.appendChild(card);

                    }

                    // JIKA TIDAK ADA YANG VALID
                    if (container.innerHTML == "") {

                        errorBox.style.display = "block";

                        errorBox.innerHTML =
                        "Tidak ada data mapel valid.";

                    }

                } catch(e) {

                    console.log(e);

                    errorBox.style.display = "block";

                    errorBox.innerHTML =
                    "Format spreadsheet tidak sesuai.";

                }

            }

            // GAGAL
            else {

                errorBox.style.display = "block";

                errorBox.innerHTML =
                "Gagal mengambil data spreadsheet.";

            }

        }

    };

    xhr.open("GET", url, true);
    xhr.send();

}

loadMapel();

</script>

</body>
</html>
